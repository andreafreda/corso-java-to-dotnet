services:
  azuresql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: ../OrderService
      dockerfile: Dockerfile
    command: ["--migrate-only"]
    environment:
      ConnectionStrings__Default: "Server=azuresql,1433;Database=OrderDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"
    depends_on:
      azuresql:
        condition: service_healthy
    restart: on-failure

  orderservice:
    build:
      context: ../OrderService
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=azuresql,1433;Database=OrderDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"
    depends_on:
      azuresql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
